<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Send Email</title>
  </head>
  <body>
    <h1>Contact Form</h1>

    <form id="contactForm">
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required />
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="8" required></textarea>
      </div>
      <div>
        <input id="marketingOptIn" name="marketingOptIn" type="checkbox" />
        <label for="marketingOptIn">
          We can send you product updates and offers via email. It is possible to opt-out at any time.
        </label>
      </div>
      <button type="submit">Submit</button>
    </form>

    <p id="status" aria-live="polite"></p>

    <script>
      const WORKER_SEND_ENDPOINT = "https://prop-copack-form.aaron-4d8.workers.dev";

      const form = document.getElementById("contactForm");
      const statusEl = document.getElementById("status");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        statusEl.textContent = "Sending...";

        const formData = new FormData(form);
        const name = formData.get("name");
        const email = formData.get("email");
        const message = formData.get("message");
        const marketingOptIn = formData.get("marketingOptIn") === "on";

        const payload = {
          name,
          email,
          message,
          marketingOptIn
        };

        try {
          const response = await fetch(WORKER_SEND_ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          const result = await response.json();

          if (!response.ok || result.data?.succeeded !== 1) {
            const errorMessage = result?.data?.error || result?.error || "Failed to submit form.";
            throw new Error(errorMessage);
          }

          statusEl.textContent = "Form submitted successfully.";
          form.reset();
        } catch (error) {
          statusEl.textContent = `Error: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
