<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Service Hero Images - Propeller Co-Pack</title>
  <style>
    :root {
      --bg: #fff;
      --surface: #f6f8fa;
      --text: #1f2328;
      --muted: #656d76;
      --border: #d0d7de;
      --accent: #0969da;
      --bad: #cf222e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0 auto;
      max-width: 72rem;
      padding: 2rem 1.25rem 3rem;
      font: 16px/1.6 "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    h1 { margin: 0 0 0.4rem; font-size: 1.75rem; }
    p { margin: 0 0 1rem; color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.95rem;
      margin-top: 1rem;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 0.75rem;
    }
    .card h2 {
      margin: 0 0 0.35rem;
      font-size: 1rem;
      line-height: 1.35;
    }
    .meta {
      margin: 0 0 0.45rem;
      font-size: 0.85rem;
      color: var(--muted);
      word-break: break-all;
    }
    .hero {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #4d7946;
    }
    .error {
      border-left: 4px solid var(--bad);
      background: #fff5f5;
      color: var(--bad);
      padding: 0.65rem 0.75rem;
      border-radius: 6px;
      margin-top: 1rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Service Page Hero Images</h1>
  <p>Private internal page. Agent-built hero image inventory sourced from service page <span class="meta">picture</span> tags.</p>
  <p><a href="../">Back to SEO KPI page</a></p>
  <div id="grid" class="grid" aria-live="polite"></div>

  <script>
    (function () {
      const services = [
        {
                "name": "40,000 Sq. Ft. Facility",
                "path": "../../40000-sq-ft-facility/",
                "imageUrl": "../../img/40000%20Sq.%20Ft..png",
                "altText": "40,000 square foot manufacturing facility"
        },
        {
                "name": "Bottles / Jars",
                "path": "../../bottles-and-jars/",
                "imageUrl": "../../img/Jar%20Line%20Art%20%28White%29.png",
                "altText": "Bottles and jars"
        },
        {
                "name": "Custom Projects",
                "path": "../../custom-projects/",
                "imageUrl": "../../img/Small%20Runs.png",
                "altText": "Custom projects"
        },
        {
                "name": "Customer Service",
                "path": "../../customer-service/",
                "imageUrl": "../../img/Customer%20Service.png",
                "altText": "Customer service"
        },
        {
                "name": "Distribution",
                "path": "../../distribution/",
                "imageUrl": "../../img/Distribution.png",
                "altText": "Distribution and logistics"
        },
        {
                "name": "Formulation",
                "path": "../../formulation/",
                "imageUrl": "../../img/Ingredients.png",
                "altText": "Formulation"
        },
        {
                "name": "Fulfillment",
                "path": "../../fulfillment/",
                "imageUrl": "../../img/3PL.png",
                "altText": "Fulfillment and logistics"
        },
        {
                "name": "Ingredient Solutions",
                "path": "../../ingredient-solutions/",
                "imageUrl": "../../img/Formulation.png",
                "altText": "Ingredient solutions"
        },
        {
                "name": "Loading Docks",
                "path": "../../loading-docks/",
                "imageUrl": "../../img/Dock%20Doors.png",
                "altText": "Loading docks"
        },
        {
                "name": "Low MOQs",
                "path": "../../low-moqs/",
                "imageUrl": "../../img/Low%20MOQs.png",
                "altText": "Low minimum order quantities"
        },
        {
                "name": "Manufacturing",
                "path": "../../manufacturing/",
                "imageUrl": "../../img/Conveyor%20Belt.png",
                "altText": "Powder manufacturing"
        },
        {
                "name": "Packaging Design",
                "path": "../../packaging-design/",
                "imageUrl": "../../img/Packaging%20Design.png",
                "altText": "Packaging design"
        },
        {
                "name": "Blending",
                "path": "../../powder-blending/",
                "imageUrl": "../../img/Blending.png",
                "altText": "Blending"
        },
        {
                "name": "Product Development",
                "path": "../../product-development/",
                "imageUrl": "../../img/RandD.png",
                "altText": "Product development"
        },
        {
                "name": "Testing",
                "path": "../../product-testing/",
                "imageUrl": "../../img/Testing.png",
                "altText": "Product testing and quality"
        },
        {
                "name": "Quality & Compliance",
                "path": "../../quality-compliance/",
                "imageUrl": "../../img/FDA.png",
                "altText": "Quality and compliance"
        },
        {
                "name": "Sachets",
                "path": "../../sachet-packaging/",
                "imageUrl": "../../img/Sachet%20Line%20Art%20%28White%29.png",
                "altText": "Sachets"
        },
        {
                "name": "Stand Up Pouches",
                "path": "../../stand-up-pouches/",
                "imageUrl": "../../img/Pouch%20Line%20Art%20%28White%29.png",
                "altText": "Stand up pouches"
        },
        {
                "name": "Stick Packs",
                "path": "../../stick-pack-packaging/",
                "imageUrl": "../../img/Stick%20Line%20Art%20%28White%29.png",
                "altText": "Stick packs"
        },
        {
                "name": "Turn-Key",
                "path": "../../turn-key-co-packing/",
                "imageUrl": "../../img/Turn%20Key%203.png",
                "altText": "Turn-key co-manufacturing"
        },
        {
                "name": "White Label",
                "path": "../../white-label/",
                "imageUrl": "../../img/White%20Label.png",
                "altText": "White label products"
        }
];
      const grid = document.getElementById("grid");

      function cardMarkup(name, path, imageUrl, altText) {
        const card = document.createElement("article");
        card.className = "card";

        const heading = document.createElement("h2");
        const link = document.createElement("a");
        link.href = path;
        link.textContent = name || path;
        heading.appendChild(link);

        const pathMeta = document.createElement("p");
        pathMeta.className = "meta";
        pathMeta.textContent = path;

        const imageMeta = document.createElement("p");
        imageMeta.className = "meta";
        imageMeta.textContent = imageUrl;

        const image = document.createElement("img");
        image.className = "hero";
        image.src = imageUrl;
        image.alt = altText || (name + " hero image");
        image.loading = "lazy";

        card.appendChild(heading);
        card.appendChild(pathMeta);
        card.appendChild(imageMeta);
        card.appendChild(image);
        return card;
      }

      services.forEach(function (service) {
        grid.appendChild(cardMarkup(service.name, service.path, service.imageUrl, service.altText));
      });
    })();
  </script>
</body>
</html>
